# =====================================================================
# CONFIGURAZIONE TRACKER (YOLO / RE-ID INTERNO)
# =====================================================================

# Tipo di tracker utilizzato
tracker_type: tracktrack  # botsort | bytetrack | ocsort | deepocsort | fasttrack | tracktrack

# Soglie di rilevamento e tracciamento (Ottimizzate per alte velocità)
track_high_thresh: 0.4    # Accetta rilevamenti più sfocati o veloci
track_low_thresh: 0.1     # Soglia minima per non perdere la traccia
new_track_thresh: 0.4     # Inizia il tracking anche con motion blur
track_buffer: 60          # Frame di memoria per mantenere le tracce perse
match_thresh: 0.9         # Tolleranza per grandi "salti" di pixel tra frame
lost_match_thr: 0.9       # Soglia di recupero per tracce perse

# Pesi di Associazione (Bilanciamento metriche)
iou_weight: 0.3           # Abbassato: la sovrapposizione è meno affidabile
reid_weight: 0.7          # Alzato: focus su aspetto visivo (colore/forma)
conf_weight: 0.1          # Peso della confidenza del detector
angle_weight: 0.05        # Peso dell'angolo di movimento del veicolo 

# Parametri di Assegnazione Iterativa
penalty_p: 0.2            # Penalità per rilevamenti a bassa affidabilità
penalty_q: 0.4            # Penalità per i rilevamenti recuperati da NMS secondario
reduce_step: 0.05         # Rilassamento della soglia di corrispondenza per iterazione

# Track-Aware Initialization (TAI)
tai_thr: 0.55             # Soglia IoU per l'inizializzazione NMS basata sulla traccia
min_track_len: 1          # Conferma la traccia fin dal primo frame utile

# Compensazione del movimento della telecamera (GMC)
gmc_method: sparseOptFlow # sparseOptFlow | orb | sift | ecc | none

# Modello di Re-Identificazione (ReID)
with_reid: True           # Vitale per ricollegare veicoli dopo occlusioni
model: auto               # Seleziona automaticamente il modello ReID nativo

# Soglie di fusione e prossimità
proximity_thresh: 0.5     # Minimo IoU richiesto per una corrispondenza ReID valida.
appearance_thresh: 0.8    # Somiglianza minima nell'aspetto richiesta per ReID
fuse_score: True          # Se combinare i punteggi di confidenza con le distanze IoU prima del matching.